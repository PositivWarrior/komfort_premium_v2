name: Update Google Reviews

# Codzienne uruchomienie o 6:00 UTC (7:00 CET / 8:00 CEST)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Wymuś pełny build + deploy na Hostinger (nawet jeśli opinie się nie zmieniły)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: update-google-reviews
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: premium-next/package-lock.json

      # ── 1. Pobranie opinii z Google ─────────────────────────────────
      - name: Fetch Google Reviews
        working-directory: premium-next
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-google-reviews.js

      # ── 2. Wykrycie czy opinie faktycznie się zmieniły ──────────────
      #    Ignorujemy pole "fetchedAt" (zmienia się przy każdym uruchomieniu).
      - name: Detect real changes in reviews
        id: detect_changes
        run: |
          set -e
          FILE_DATA="premium-next/src/data/google-reviews.json"
          FILE_PUBLIC="premium-next/public/google-reviews.json"

          # Wyciągamy tylko właściwą treść opinii (bez fetchedAt) i porównujemy z HEAD.
          CURRENT_HASH=$(jq -S 'del(.fetchedAt)' "${FILE_DATA}" | sha256sum | cut -d' ' -f1)
          PREVIOUS_HASH=$(git show "HEAD:${FILE_DATA}" 2>/dev/null | jq -S 'del(.fetchedAt)' | sha256sum | cut -d' ' -f1 || echo "none")

          echo "Current  hash: ${CURRENT_HASH}"
          echo "Previous hash: ${PREVIOUS_HASH}"

          if [ "${CURRENT_HASH}" != "${PREVIOUS_HASH}" ]; then
            echo "reviews_changed=true" >> $GITHUB_OUTPUT
            echo "Zmiana opinii wykryta - uruchomimy build i deploy."
          else
            echo "reviews_changed=false" >> $GITHUB_OUTPUT
            echo "Brak rzeczywistych zmian w opiniach."
          fi

      # ── 3. Decyzja: czy robić pełny build + deploy ──────────────────
      - name: Decide if we should build & deploy
        id: should_deploy
        run: |
          FORCE="${{ github.event.inputs.force_deploy }}"
          CHANGED="${{ steps.detect_changes.outputs.reviews_changed }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${FORCE}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Deploy: TAK (ręczne uruchomienie z force_deploy=true)"
          elif [ "${CHANGED}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Deploy: TAK (są nowe opinie)"
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Deploy: NIE (brak zmian i brak wymuszenia)"
          fi

      # ── 4. Commit zaktualizowanych opinii (jeśli się zmieniły) ──────
      - name: Commit and push updated reviews
        if: steps.detect_changes.outputs.reviews_changed == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add premium-next/src/data/google-reviews.json premium-next/public/google-reviews.json
          git commit -m "chore: update Google reviews [automated]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # ── 5. Pełny build strony Next.js ───────────────────────────────
      - name: Install dependencies
        if: steps.should_deploy.outputs.deploy == 'true'
        working-directory: premium-next
        run: npm ci

      - name: Build static site
        if: steps.should_deploy.outputs.deploy == 'true'
        working-directory: premium-next
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: npm run build

      - name: Verify build output
        if: steps.should_deploy.outputs.deploy == 'true'
        run: |
          if [ ! -d "premium-next/out" ]; then
            echo "ERROR: premium-next/out/ nie zostało wygenerowane przez build!"
            exit 1
          fi
          echo "Rozmiar wygenerowanej strony:"
          du -sh premium-next/out/
          echo "Pliki w out/:"
          ls -la premium-next/out/ | head -30

      # ── 6a. Diagnostyka FTP (PRZED deployem) ────────────────────────
      #     Pokazuje:
      #     - aktualny katalog roboczy po zalogowaniu
      #     - listing roota
      #     - listing katalogu, do którego planujemy deploy
      #     - daty modyfikacji index.html i google-reviews.json przed deployem
      - name: Diagnose Hostinger FTP (before deploy)
        if: steps.should_deploy.outputs.deploy == 'true'
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          echo "=== Cel deployu: '${FTP_DIR}' ==="
          lftp -u "${FTP_USER},${FTP_PASS}" -p 21 "${FTP_HOST}" <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode on
          echo "--- pwd (po zalogowaniu): ---"
          pwd
          echo "--- ls / (root FTP): ---"
          cls -la /
          echo "--- ls ${FTP_DIR} (docelowy katalog): ---"
          cls -la "${FTP_DIR}" || echo "[BLAD] Katalog ${FTP_DIR} nieosiagalny!"
          bye
          EOF

      # ── 6b. Deploy całej strony na Hostinger (FTP) ───────────────────
      - name: Deploy full site to Hostinger (FTP)
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./premium-next/out/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          # Verbose - pokaze kazdy upload w logach
          log-level: verbose
          # Nie czyścimy całego public_html - mogą tam być inne pliki Hostingera.
          dangerous-clean-slate: false
          # Pomijamy pliki, które nie powinny lądować na produkcji.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      # ── 6c. Diagnostyka FTP (PO deployu) ────────────────────────────
      #     Potwierdzenie, ze pliki rzeczywiscie sa w docelowym katalogu.
      - name: Diagnose Hostinger FTP (after deploy)
        if: steps.should_deploy.outputs.deploy == 'true'
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          echo "=== Stan ${FTP_DIR} po deployu ==="
          lftp -u "${FTP_USER},${FTP_PASS}" -p 21 "${FTP_HOST}" <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode on
          cls -la "${FTP_DIR}" || echo "[BLAD] Katalog ${FTP_DIR} nieosiagalny!"
          echo "--- index.html: ---"
          cls -la "${FTP_DIR}/index.html" || echo "BRAK index.html"
          echo "--- google-reviews.json: ---"
          cls -la "${FTP_DIR}/google-reviews.json" || echo "BRAK google-reviews.json"
          bye
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Podsumowanie" >> $GITHUB_STEP_SUMMARY
          echo "- Opinie zmienione: \`${{ steps.detect_changes.outputs.reviews_changed }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Pełny build + deploy: \`${{ steps.should_deploy.outputs.deploy }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
