name: Update Google Reviews

# Runs every day at 6:00 AM UTC (7:00 AM CET / 8:00 AM CEST)
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-google-reviews
  cancel-in-progress: true

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use github.token so push has write perms (matches permissions.contents: write)
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Google Reviews
        working-directory: premium-next
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-google-reviews.js

      - name: Commit and push if reviews changed
        run: |
          set -e
          REPO_ROOT="${GITHUB_WORKSPACE}"
          FILE_DATA="${REPO_ROOT}/premium-next/src/data/google-reviews.json"
          FILE_PUBLIC="${REPO_ROOT}/premium-next/public/google-reviews.json"

          cd "${REPO_ROOT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CHANGED=0
          git diff --quiet HEAD -- "${FILE_DATA}" || CHANGED=1
          git diff --quiet HEAD -- "${FILE_PUBLIC}" || CHANGED=1

          if [ "$CHANGED" -eq 1 ]; then
            git add "${FILE_DATA}" "${FILE_PUBLIC}"
            git commit -m "chore: update Google reviews [automated]"
            # Explicit remote URL avoids auth edge-cases that yield git exit 128
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          else
            echo "No changes to google-reviews.json; skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Wgrywa google-reviews.json na Hostinger: w poniedziałki + przy ręcznym "Run workflow"
      - name: Check if Hostinger deploy should run
        id: deploy_gate
        run: |
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Deploy: tak (poniedziałek lub ręczne uruchomienie)"
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Deploy: pominięty (tylko poniedziałek lub Run workflow)"
          fi

      - name: Prepare FTP payload
        if: steps.deploy_gate.outputs.deploy == 'true'
        run: |
          mkdir -p deploy-reviews
          cp premium-next/public/google-reviews.json deploy-reviews/
          ls -la deploy-reviews/

      - name: Normalize FTP server directory
        if: steps.deploy_gate.outputs.deploy == 'true'
        id: ftp_dir
        run: |
          DIR="${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}"
          if [ -z "$DIR" ]; then
            DIR="public_html/"
          elif [ "${DIR: -1}" != "/" ]; then
            DIR="${DIR}/"
          fi
          echo "dir=${DIR}" >> "$GITHUB_OUTPUT"
          echo "FTP server-dir: ${DIR}"

      - name: Upload google-reviews.json to Hostinger (FTP)
        if: steps.deploy_gate.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./deploy-reviews/
          server-dir: ${{ steps.ftp_dir.outputs.dir }}
          dangerous-clean-slate: false
